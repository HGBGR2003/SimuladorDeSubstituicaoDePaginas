<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Substituição de Páginas</title>
    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body>
    <header>
      <h1>Simulador de Substituição de Páginas</h1>
      <p class="subtitle">FIFO · LRU · OPT · Clock — Navegação passo a passo</p>
    </header>

    <main>
      <section class="config-panel" aria-label="Configuração da simulação">
        <form
          onsubmit="
            event.preventDefault();
            init();
          "
        >
          <div class="field">
            <label for="refStr">String de referência</label>
            <input
              type="text"
              id="refStr"
              name="refStr"
              value="7 0 1 2 0 3 0 4 2 3 0 3 2 1 2 0 1 7 0 1"
              placeholder="ex: 7 0 1 2 0 3"
              aria-describedby="refStrHint"
            />
            <small id="refStrHint"
              >Insira os números separados por espaço.</small
            >
          </div>

          <div class="field">
            <label for="nFrames">Quadros</label>
            <input
              type="number"
              id="nFrames"
              name="nFrames"
              value="3"
              min="1"
              max="8"
              aria-describedby="nFramesHint"
            />
            <small id="nFramesHint"
              >Número de quadros disponíveis na memória (1–8).</small
            >
          </div>

          <div class="config-actions">
            <button type="submit" class="btn btn-primary">▶ Simular</button>
            <button type="button" class="btn" onclick="loadExample()">
              Exemplo
            </button>
          </div>
        </form>
      </section>

      <nav
        class="algo-tabs"
        id="algoTabs"
        aria-label="Algoritmos de substituição"
      ></nav>

      <section
        class="step-nav"
        id="stepNav"
        aria-label="Navegação entre passos"
        hidden
      >
        <button
          class="nav-btn"
          id="btnFirst"
          onclick="goStep(0)"
          aria-label="Primeiro passo"
        >
          «
        </button>
        <button
          class="nav-btn"
          id="btnPrev"
          onclick="goStep(currentStep - 1)"
          aria-label="Passo anterior"
        >
          ‹
        </button>

        <div
          class="progress-bar"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="0"
          aria-label="Progresso da simulação"
        >
          <div class="progress-fill" id="progFill"></div>
        </div>

        <button
          class="nav-btn"
          id="btnNext"
          onclick="goStep(currentStep + 1)"
          aria-label="Próximo passo"
        >
          ›
        </button>
        <button
          class="nav-btn"
          id="btnLast"
          onclick="goStep(totalSteps - 1)"
          aria-label="Último passo"
        >
          »
        </button>

        <output class="step-label" id="stepLbl" aria-live="polite"></output>
      </section>

      <section
        id="content"
        aria-label="Resultado da simulação"
        aria-live="polite"
      >
        <p class="empty-state">
          Configure a string de referência e clique em
          <strong>▶ Simular</strong>.
        </p>
      </section>
    </main>

    <script src="script/firstOut.js"></script>
    <script src="script/leastRecently.js"></script>
    <script src="script/optimal.js"></script>
    <script src="script/secondChance.js"></script>
    <script src="script/render.js"></script>
    <script src="script/interfaceUser.js"></script>
  </body>
</html>
